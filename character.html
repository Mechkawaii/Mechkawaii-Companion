<!doctype html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" type="image/png" href="./assets/heart.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- ✅ PWA FULLSCREEN FIX iOS -->
  <meta name="theme-color" content="#05060a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mechkawaii" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/icon-180.png" />

  <title>Mechkawaii — Fiche personnage</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./breadcrumb.css" />
  <link rel="stylesheet" href="./ult-glow.css" />
  <link rel="stylesheet" href="./shield-visual.css" />

  <style>
    .brand-with-portrait{display:flex;align-items:center;gap:16px;}
    #charPortrait{width:100px;height:100px;border-radius:12px;overflow:hidden;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;position: relative;}
    #charPortrait img{max-width:100%;max-height:100%;object-fit:contain;display:block;}
    @media (max-width:480px){#charPortrait{ width:80px; height:80px; }.brand-with-portrait{ gap:12px; }}
    .patterns-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px;}
    @media (min-width:769px){.patterns-grid{ grid-template-columns:1fr 1fr; }}
    .image-container{width:100%;display:flex;align-items:center;justify-content:center;background-color:rgba(0,0,0,0.05);border-radius:var(--radius-md);border:1px solid var(--border);padding:8px;}
    .image-container img{width:100%;max-width:100%;height:auto;display:block;object-fit:contain;}
    @media (max-width:480px){ .image-container{ min-height:150px; } }
    @media (min-width:481px) and (max-width:768px){ .image-container{ min-height:250px; } }
    @media (min-width:769px){ .image-container{ min-height:300px; } }
    @media (min-width:1200px){ .image-container{ min-height:350px; } }
    .shields-display{display:flex;flex-direction:row;flex-wrap:wrap;gap:8px;margin-top:8px;}
    #repairKeysDisplay{display:flex;flex-wrap:wrap;gap:8px;}
    #charPortrait .ko-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;}
  </style>
</head>
<body class="page-character">
  <div class="container">
    <div class="topbar">
      <div class="brand-with-portrait">
        <div id="charPortrait"><div class="ko-overlay" aria-hidden="true"></div></div>
        <div>
          <div class="title" id="charName">Personnage</div>
          <div class="subtitle" id="charClass">Classe</div>
        </div>
      </div>
      <div class="controls"><div class="pill"><span class="small">Lang</span><select id="lang" aria-label="Language"><option value="fr">FR</option><option value="en">EN</option></select></div></div>
    </div>

    <div class="card" id="hpCard" style="margin-top:16px;">
      <div class="card-h"><div class="section-title" data-i18n="char_hp_card" style="margin: 0;">Points de Vie / Boucliers / Clés de Réparation</div></div>
      <div class="card-b">
        <div class="hp-shields-wrapper">
          <div class="hp-section">
            <div style="font-weight: 600; margin-bottom: 8px;" data-i18n="char_hp">Points de Vie</div>
            <div class="hp">
              <div id="hpHearts" class="hearts"></div>
              <div style="display:flex; align-items:center; gap:6px;"><span id="hpCur" style="font-weight:800; font-size:18px;">0</span><span id="hpMaxLabel" style="color:var(--muted);">/ 0</span></div>
            </div>
            <div class="hp-ctl" style="margin-top:12px;"><button id="hpMinus">−</button><button id="hpPlus">+</button></div>
          </div>

          <div class="shields-section">
            <div style="font-weight: 600; margin-bottom: 8px;" data-i18n="char_shields">Boucliers (Réserve partagée)</div>
            <div class="shields-display" id="shieldsDisplay"></div>
          </div>

          <div class="repair-section">
            <div style="font-weight: 600; margin-bottom: 8px;" data-i18n="char_keys">Clés de réparation</div>
            <div id="repairKeysDisplay"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;"><div class="card-h"><div class="section-title" id="classActionTitle">Action de classe</div></div><div class="card-b"><p id="classActionBody" style="margin:0;"></p></div></div>

    <div class="card" style="margin-top:16px;"><div class="card-h"><div class="section-title" id="ultTitle">Coup Unique</div></div><div class="card-b"><p id="ultBody" style="margin:0 0 12px 0;"></p><div id="ultToggleContainer"></div></div></div>

    <div class="patterns-grid">
      <div class="card"><div class="card-h"><div class="section-title" data-i18n="char_movement">Déplacement</div></div><div class="card-b"><p id="movementDesc"></p><div class="image-container"><img id="movementImg" /></div></div></div>
      <div class="card"><div class="card-h"><div class="section-title" data-i18n="char_attack">Attaque</div></div><div class="card-b"><p id="attackDesc"></p><div class="image-container"><img id="attackImg" /></div></div></div>
    </div>

    <div class="controls" style="margin-top:16px; justify-content:space-between;"><div style="display:flex; gap:10px;"><button id="resetBtn" class="btn-danger" data-i18n="reset_char">Réinitialiser</button></div><button id="backBtn" style="display:none;">← Retour</button></div>

    <div id="error" style="margin-top:16px;"></div>
  </div>

  <div class="unit-tabs-container" id="unitTabsContainer"><div class="unit-tabs" id="unitTabs"></div></div>

  <script src="./app.js"></script>
  <script src="./shield-cancel-fix.js"></script>
  <script src="./repair-keys.js"></script>
  <script src="./tabs-all.js" defer></script>
  <script src="./shield-tabs-sync.js" defer></script>
  <script src="./breadcrumb-character.js" defer></script>
  <script src="./ult-glow.js" defer></script>
  <script src="./tutorial.js"></script>
</body>
</html>
