<!doctype html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" type="image/png" href="./assets/heart.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mechkawaii — Fiche personnage</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./breadcrumb.css" />
  <link rel="stylesheet" href="./ult-glow.css" />

  <style>
    .brand-with-portrait{display:flex;align-items:center;gap:16px;}
    #charPortrait{width:100px;height:100px;border-radius:12px;overflow:hidden;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
    #charPortrait img{max-width:100%;max-height:100%;object-fit:contain;display:block;}
    @media (max-width:480px){#charPortrait{width:80px;height:80px}.brand-with-portrait{gap:12px}}
    .patterns-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px}
    @media (min-width:769px){.patterns-grid{grid-template-columns:1fr 1fr}}
    .image-container{width:100%;display:flex;align-items:center;justify-content:center;background-color:rgba(0,0,0,.05);border-radius:var(--radius-md);border:1px solid var(--border);padding:8px}
    .image-container img{width:100%;max-width:100%;height:auto;display:block;object-fit:contain}
    .shields-display,#repairKeysDisplay{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    #charPortrait .ko-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none}

    .tutorial-btn{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,77,252,.6);background:#12121a;color:#fff;font-weight:900;font-size:16px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 10px rgba(255,77,252,.4)}
    .tutorial-btn:hover{background:#ff4dfc;color:#111}
  </style>
</head>

<body class="page-character">
  <div class="container">

    <div class="topbar">
      <div class="brand-with-portrait">
        <div id="charPortrait"><div class="ko-overlay"></div></div>
        <div><div class="title" id="charName">Personnage</div><div class="subtitle" id="charClass">Classe</div></div>
      </div>

      <div class="controls" style="display:flex;align-items:center;gap:10px;">
        <button id="tutorialBtn" class="tutorial-btn">ⓘ</button>
        <div class="pill"><span class="small">Lang</span><select id="lang"><option value="fr">FR</option><option value="en">EN</option></select></div>
      </div>
    </div>

    <div class="card" id="hpCard" style="margin-top:16px;"></div>

  </div>

  <script src="./app.js"></script>
  <script src="./tutorial.js"></script>
</body>
</html>
